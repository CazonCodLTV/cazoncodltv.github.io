<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Welcome to CazonCodLTV - your source for tech, gaming, and more!">
    <meta name="keywords" content="CazonCodLTV, cazoncodltv youtube, Cazon Carter, tutorials, reviews">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs by Cazon</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(45deg, #222, #333, #111);
            background-size: 400% 400%;
            animation: backgroundShift 10s ease infinite;
            overflow: hidden;
            color: white;
            text-align: center;
            transition: transform 1s ease-in-out;
        }

        @keyframes backgroundShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .heading {
            font-size: 3rem;
            color: #ff4500;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.7);
            animation: fireGlow 2s ease-in-out infinite alternate;
        }

        @keyframes fireGlow {
            0% { text-shadow: 0 0 10px #ff4500; }
            100% { text-shadow: 0 0 20px #ff6347; }
        }

        .subheading {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards 0.5s;
        }

        .warning-overlay button {
            margin-top: 1rem;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(135deg, #ff4500, #ff6347);
            border: none;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease-in-out forwards 1s;
        }

        .warning-overlay button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
        }

        .message {
            font-size: 2rem;
            display: none;
            animation: fadeIn 1s ease-in-out, zoomIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="warning-overlay" id="warning-overlay">
        <div class="heading">Viewer Discretion Advised</div>
        <div class="subheading">The contents on this page may contain NSFW material. Please proceed with caution.</div>
        <div>
            <button onclick="enterSite()">Enter</button>
            <button onclick="leaveSite()">Leave</button>
        </div>
    </div>

    <div class="message" id="message">
        Well, this is empty..
        <div class="subheading">Check back later when our devs decide to program this page.</div>
    </div>

    <script>
        function enterSite() {
            document.getElementById("warning-overlay").classList.add("hidden");
            document.body.style.transform = "scale(1.02)";
            setTimeout(() => {
                document.getElementById("warning-overlay").style.display = "none";
                document.getElementById("message").style.display = "block";
                document.body.style.transform = "scale(1)";
            }, 1000);
        }

        function leaveSite() {
            window.location.href = "https://www.cazoncodltv.com";
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter") enterSite();
            if (event.key === "Escape") leaveSite();
        });
    </script>
</body>
</html>
